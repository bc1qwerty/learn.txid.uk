[[quotes]]
text = "貨幣の価値を操作することは、すべての人への詐欺である。"
author = "フレデリック・バスティア"

[[quotes]]
text = "経済計算なくして、経済活動はない。"
author = "ルートヴィヒ・フォン・ミーゼス"

[[quotes]]
text = "インフレーションは合法的な偽造である。"
author = "マレー・ロスバード"

[[quotes]]
text = "信じないなら、理解できないなら、申し訳ないが説得する時間はない。"
author = "サトシ・ナカモト"

[[quotes]]
text = "自由を大切にする人は、個人の行動に対する国家の干渉に常に疑問を持つ。"
author = "フリードリヒ・ハイエク"

[[quotes]]
text = "良い貨幣は政治家ではなく、市場が決める。"
author = "フリードリヒ・ハイエク"

[[quotes]]
text = "政府は私を守るという名目で使う力で、私を破壊することができる。"
author = "マレー・ロスバード"

[[quotes]]
text = "自由な社会では、国家は個人に奉仕する。個人が国家に奉仕するのではない。"
author = "ロン・ポール"

[[quotes]]
text = "金本位制の利点は、金の量が政府の気まぐれに依存しないことだ。"
author = "ルートヴィヒ・フォン・ミーゼス"

[[quotes]]
text = "国家とは、他のすべての人が犯罪とみなす行為を合法的に行う組織である。"
author = "マレー・ロスバード"

[[quotes]]
text = "法が略奪の道具になるとき、法の道徳性は消える。"
author = "フレデリック・バスティア"

[[quotes]]
text = "健全な貨幣の原則には二つの側面がある。市場の貨幣選択への肯定と、政府の貨幣操作への否定である。"
author = "ルートヴィヒ・フォン・ミーゼス"
