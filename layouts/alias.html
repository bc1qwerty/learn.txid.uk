<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script>
(function() {
  // 이미 언어 서브디렉토리에 있으면 아무것도 하지 않음
  var path = window.location.pathname;
  if (/^\/(ko|en|ja)(\/|$)/.test(path)) return;

  // localStorage에 저장된 언어 우선 사용
  var saved = null;
  try { saved = localStorage.getItem('preferred-lang'); } catch(e) {}
  if (saved === 'en' || saved === 'ja' || saved === 'ko') {
    window.location.replace('/' + saved + '/');
    return;
  }

  // 브라우저 언어 감지
  var langs = navigator.languages || [navigator.language || navigator.userLanguage || 'en'];
  var dest = '/en/'; // default: English
  for (var i = 0; i < langs.length; i++) {
    var l = langs[i].toLowerCase();
    if (l.startsWith('ko')) { dest = '/ko/'; break; }
    if (l.startsWith('ja')) { dest = '/ja/'; break; }
    if (l.startsWith('en')) { dest = '/en/'; break; }
  }
  window.location.replace(dest);
})();
</script>
<meta http-equiv="refresh" content="0; url={{ .Permalink }}">
<title>Redirecting...</title>
</head>
<body></body>
</html>
