{{ define "main" }}
<div class="max-w-3xl mx-auto px-4 sm:px-6 py-12">
  <header class="mb-10">
    <h1 class="text-3xl sm:text-4xl font-bold text-white">{{ .Title }}</h1>
    {{ with .Description }}
    <p class="mt-3 text-lg text-gray-400">{{ . }}</p>
    {{ end }}
  </header>

  <div class="prose prose-invert prose-gray max-w-none
    prose-h2:text-xl prose-h2:font-bold prose-h2:text-bitcoin prose-h2:mt-10 prose-h2:mb-4
    prose-summary:cursor-pointer prose-summary:text-white
    [&_details]:border [&_details]:border-gray-800 [&_details]:rounded-xl [&_details]:mb-3 [&_details]:px-5 [&_details]:py-1
    [&_details[open]]:border-bitcoin/30 [&_details[open]]:bg-gray-900/40
    [&_summary]:list-none [&_summary]:py-3 [&_summary]:font-semibold [&_summary]:text-white [&_summary]:hover:text-bitcoin [&_summary]:transition-colors
    [&_details_p]:text-gray-400 [&_details_p]:text-sm [&_details_p]:leading-relaxed [&_details_p]:mt-3 [&_details_p]:mb-4">
    {{ .Content }}
  </div>
</div>
{{ end }}
