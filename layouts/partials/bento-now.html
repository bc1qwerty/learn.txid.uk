<h2 class="tile-title"><span data-i18n="요즘">{{ site.Params.now.title | default "요즘" }}</span></h2>
<ul class="now-list">
    {{ range site.Params.now.items }}
    <li>{{ . }}</li>
    {{ end }}
</ul>
{{ with site.Params.now.updated }}
<span class="now-updated"><span data-i18n="업데이트">업데이트</span> {{ . }}</span>
{{ end }}
