{{- if eq .Type "blog" -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "@id": "{{ .Permalink }}#article",
  "headline": {{ .Title | jsonify }},
  "description": {{ with .Description }}{{ . | jsonify }}{{ else }}{{ .Summary | jsonify }}{{ end }},
  "image": {
    "@type": "ImageObject",
    "url": "{{ with .Params.image }}{{ . | absURL }}{{ else }}{{ .Site.Params.ogImage | default (printf "%s%s" .Site.BaseURL "images/og-default.png") }}{{ end }}",
    "width": 1200,
    "height": 630
  },
  "datePublished": "{{ .PublishDate.Format "2006-01-02T15:04:05Z07:00" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
  "author": {
    "@type": "Person",
    "name": "{{ with .Params.author }}{{ . }}{{ else }}{{ .Site.Params.author | default "learn.txid.uk" }}{{ end }}"
  },
  "publisher": {
    "@type": "Organization",
    "name": "{{ .Site.Title }}",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ .Site.Params.logo | default (printf "%s%s" .Site.BaseURL "images/logo.png") | absURL }}"
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  },
  "inLanguage": "{{ .Site.Language.Lang }}"
  {{- with .Params.tags }},
  "keywords": {{ delimit . ", " | jsonify }}
  {{- end }}
}
</script>
{{- end -}}
