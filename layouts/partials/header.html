{{/* 현재 페이지의 다국어 URL을 JS에 주입 */}}
<script>
window.__LANG_URLS__ = {
  {{ range .AllTranslations }}"{{ .Lang }}": "{{ .Permalink }}",
  {{ end }}"{{ .Lang }}": "{{ .Permalink }}"
};
</script>
<header class="site-header border-b border-gray-800/50 sticky z-40" style="top:var(--gnav-h,0px)">
  <nav class="max-w-5xl mx-auto px-4 sm:px-6 h-11 flex items-center gap-3">
    <!-- Logo -->
    <a href="{{ .Site.LanguagePrefix }}/" class="logo-unified" style="display:flex;align-items:center;gap:7px"><svg width="18" height="18" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
        <circle cx="20" cy="20" r="19" fill="#f7931a"/>
        <rect x="18.5" y="1" width="3" height="38" fill="#0d1117"/>
        <rect x="10" y="18.5" width="29" height="3" fill="#0d1117"/>
        <rect x="1" y="18.5" width="6" height="3" fill="#0d1117"/>
      </svg>txid.uk</a>
    <span style="color:#30363d;font-family:'Space Mono',monospace;font-size:.9rem;margin:0 2px">/</span>
    <span style="font-family:'Space Mono',monospace;font-size:.8rem;color:#6e7681">Learn</span>

    <!-- Desktop Nav — 메뉴 링크만 -->
    <div class="hidden md:flex items-center gap-3">
      <ul class="flex items-center gap-8">
        {{ range .Site.Menus.main }}
        <li>
          <a href="{{ .URL }}" class="text-sm text-gray-400 hover:text-white transition-colors{{ if $.IsMenuCurrent "main" . }} text-white{{ end }}">
            <span data-i18n="{{ .Name }}">{{ .Name }}</span>
          </a>
        </li>
        {{ end }}
      </ul>
    </div>

    <!-- nav-right: 검색 + 설정 + 로그인 + 햄버거 -->
    <div class="nav-right flex items-center gap-1.5 ml-auto flex-shrink-0">
      <!-- 데스크톱 전용: 검색 + 설정 (wrapper로 visibility 제어) -->
      <div class="hidden md:flex items-center gap-1.5">
        <button class="nav-icon-btn" id="headerSearchBtn" aria-label="검색 (Ctrl+K)" title="검색 (Ctrl+K)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <div class="settings-dropdown" id="settings-dropdown">
          <button class="nav-icon-btn" id="settings-btn" onclick="toggleSettings()" aria-label="설정" title="설정" aria-expanded="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          </button>
          <div class="settings-panel" id="settings-panel">
            <div class="settings-section">
              <div class="settings-label">{{ i18n "lang_label" }}</div>
              <div class="settings-lang-row">
                <button class="settings-lang-btn{{ if eq .Site.Language.Lang "ko" }} active{{ end }}" onclick="setLang('ko')">KO</button>
                <button class="settings-lang-btn{{ if eq .Site.Language.Lang "en" }} active{{ end }}" onclick="setLang('en')">EN</button>
                <button class="settings-lang-btn{{ if eq .Site.Language.Lang "ja" }} active{{ end }}" onclick="setLang('ja')">日</button>
              </div>
            </div>
            <div class="settings-section settings-section--border">
              <div class="settings-label">{{ i18n "theme_toggle" }}</div>
              <button class="settings-item" id="themeToggleMenu" onclick="toggleTheme()">
                <span id="theme-icon"></span>
                <span id="themeLabel">Dark</span>
              </button>
            </div>
          </div>
        </div>
      </div>
      <!-- 로그인 -->
      <div id="txid-auth-mount" style="position:relative;display:inline-flex"></div>
      <!-- 햄버거 (모바일만) -->
      <button id="menu-toggle" class="nav-hamburger-btn" aria-label="메뉴" aria-expanded="false" aria-controls="mobile-menu">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path id="menu-icon-open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          <path id="menu-icon-close" class="hidden" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- Mobile Menu (overlay dropdown) -->
  <div id="mobile-menu" class="mobile-menu hidden md:hidden">
    <ul class="mobile-menu-list">
      {{ range .Site.Menus.main }}
      <li>
        <a href="{{ .URL }}" class="mobile-menu-link">
          <span data-i18n="{{ .Name }}">{{ .Name }}</span>
        </a>
      </li>
      {{ end }}
    </ul>
    <div class="mobile-menu-footer">
      <div class="mobile-lang-row">
        <button class="settings-lang-btn{{ if eq .Site.Language.Lang "ko" }} active{{ end }}" onclick="setLang('ko')">KO</button>
        <button class="settings-lang-btn{{ if eq .Site.Language.Lang "en" }} active{{ end }}" onclick="setLang('en')">EN</button>
        <button class="settings-lang-btn{{ if eq .Site.Language.Lang "ja" }} active{{ end }}" onclick="setLang('ja')">日</button>
      </div>
    </div>
    <div class="mobile-menu-footer">
      <button class="mobile-menu-link" id="mobileSearchBtn" aria-label="검색">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        검색
      </button>
      <button class="mobile-menu-link" id="mobileThemeToggle" aria-label="테마 전환">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        테마
      </button>
    </div>
  </div>
  <div id="mobile-menu-backdrop" class="mobile-menu-backdrop hidden md:hidden"></div>
</header>
