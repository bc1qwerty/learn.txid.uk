<h2 class="tile-title">{{ i18n "people_section_title" }}</h2>
<div class="tile-list">
    {{ range first 6 (where site.RegularPages "Section" "people") }}
    <a href="{{ .RelPermalink }}" class="tile-item">
        <span class="tile-item-name">{{ .Title }}</span>
        <span class="arrow">&rarr;</span>
    </a>
    {{ else }}
    <p class="tile-empty">—</p>
    {{ end }}
</div>
<a href="{{ .Site.LanguagePrefix }}/people/" class="tile-more">{{ i18n "view_all" }} &rarr;</a>
