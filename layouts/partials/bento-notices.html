<h2 class="tile-title">{{ i18n "free_board_title" }}</h2>
<div class="tile-list" id="free-board-list">
    <p class="tile-empty">—</p>
</div>
<a href="{{ $.Site.LanguagePrefix }}/community/#free" class="tile-more">
    {{ i18n "view_all" }} &rarr;
</a>
<script>
(function(){
  var el = document.getElementById('free-board-list');
  if (!el) return;
  fetch('https://api.txid.uk/board/free/posts?limit=3&sort=newest', {credentials:'include'})
    .then(function(r){return r.json()})
    .then(function(d){
      if (!d.posts || !d.posts.length) return;
      el.innerHTML = d.posts.map(function(p){
        var dt = new Date(p.createdAt * 1000);
        var mm = String(dt.getMonth()+1).padStart(2,'0');
        var dd = String(dt.getDate()).padStart(2,'0');
        var ds = dt.getFullYear() === new Date().getFullYear()
          ? mm+'.'+dd
          : String(dt.getFullYear()).slice(2)+'.'+mm+'.'+dd;
        return '<a href="{{ $.Site.LanguagePrefix }}/community/#free/' + p.id + '" class="tile-item">'
          + '<time class="tile-item-date">' + ds + '</time>'
          + '<span class="tile-item-name">' + p.title.replace(/</g,'&lt;') + '</span>'
          + '<span class="arrow">&rarr;</span></a>';
      }).join('');
    })
    .catch(function(){});
})();
</script>
