[[params.quotes]]
  text = '화폐의 가치를 조작하는 것은 모든 사람에 대한 사기다.'
  author = '프레데릭 바스티아'

[[params.quotes]]
  text = '경제 계산이 없으면 경제 활동은 없다.'
  author = '루트비히 폰 미제스'

[[params.quotes]]
  text = '인플레이션은 합법적인 위조다.'
  author = '머리 로스바드'

[[params.quotes]]
  text = '만약 당신이 그것을 이해하지 못하거나 믿지 않는다면, 미안하지만 설득할 시간이 없다.'
  author = '사토시 나카모토'

[[params.quotes]]
  text = '자유를 소중히 여기는 사람은 개인의 행동에 대한 국가의 간섭에 항상 의문을 가진다.'
  author = '프리드리히 하이에크'

[[params.quotes]]
  text = '좋은 화폐는 정치인이 아니라 시장이 결정한다.'
  author = '프리드리히 하이에크'

[[params.quotes]]
  text = '정부는 나를 보호해주겠다는 바로 그 힘으로 나를 파괴할 수 있다.'
  author = '머리 로스바드'

[[params.quotes]]
  text = '자유로운 사회에서 국가는 개인에게 봉사하지, 개인이 국가에 봉사하는 것이 아니다.'
  author = '론 폴'

[[params.quotes]]
  text = '금본위제의 장점은 금의 양이 정부의 변덕에 의존하지 않는다는 것이다.'
  author = '루트비히 폰 미제스'

[[params.quotes]]
  text = '국가란 다른 모든 사람이 범죄로 간주하는 행위를 합법적으로 하는 조직이다.'
  author = '머리 로스바드'

[[params.quotes]]
  text = '법이 약탈의 도구가 되면, 법의 도덕성은 사라진다.'
  author = '프레데릭 바스티아'

[[params.quotes]]
  text = '건전한 화폐의 원칙은 두 가지 측면이 있다. 시장의 화폐 선택에 대한 긍정과 정부의 화폐 조작에 대한 부정이다.'
  author = '루트비히 폰 미제스'

